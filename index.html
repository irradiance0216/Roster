<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July's Garden: Auto-Scheduler</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --text: #333; --accent: #27ae60; --danger: #e74c3c; --relief: #9b59b6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-auto { background: var(--relief); color: white; width: 100%; margin-top: 10px; font-size: 1.1em; }
        
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .staff-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap: 5px; margin-bottom: 10px; align-items: center; }
        .staff-row input, .staff-row select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }

        .table-scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; border-radius: 10px; }
        table { border-collapse: collapse; min-width: 1200px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; width: 110px; }
        td:first-child, th:first-child { position: sticky; left: 0; background: #f8f9fa; z-index: 5; font-weight: bold; }
        
        .cell-fixed { background: #d4edda; font-weight: bold; }
        .cell-relief { background: #e1d5e7; font-style: italic; color: #6a1b9a; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header style="text-align:center;">
    <h1>July's Auto-Scheduler 🌸</h1>
    <div class="btn-group">
        <button class="btn-primary" onclick="initShift('07:45', '14:45')">Early Shift</button>
        <button class="btn-primary" onclick="initShift('14:45', '21:45')">Afternoon Shift</button>
        <button class="btn-primary" onclick="initShift('21:45', '07:45')">Night Shift</button>
    </div>
</header>

<main>
    <section id="config-zone" class="hidden">
        <div class="card">
            <h3>1. Staff Registry</h3>
            <div id="staff-list">
                </div>
            <button onclick="addStaffRow()">+ Add Worker</button>
            <button class="btn-auto" onclick="generateAutoRoster()">🚀 Auto-Assign & Balance Breaks</button>
        </div>
        
        <div class="table-scroll-wrapper">
            <table>
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </section>

    <section id="summary-zone" class="hidden">
        <div id="summary-content"></div>
        <button class="btn-primary" style="width:100%;" onclick="backToEdit()">Back to Grid</button>
    </section>
</main>

<script>
    let times = [], positions = [], staffData = [];
    const mandatoryPositions = ["EA", "SA", "WA", "TA", "DA", "CFD1", "CFD2", "CFD3", "BA1", "BA2"];

    function initShift(start, end) {
        times = [];
        positions = [...mandatoryPositions];
        let curr = new Date(`2026-01-01T${start}:00`), stop = new Date(`2026-01-01T${end}:00`);
        if (stop <= curr) stop.setDate(stop.getDate() + 1);
        while (curr < stop) {
            times.push(curr.toTimeString().substring(0, 5));
            curr.setMinutes(curr.getMinutes() + 15);
        }
        document.getElementById('config-zone').classList.remove('hidden');
        renderTable();
        if (staffData.length === 0) addStaffRow(); // Start with one row
    }

    function addStaffRow() {
        const container = document.getElementById('staff-list');
        const row = document.createElement('div');
        row.className = 'staff-row';
        row.innerHTML = `
            <input type="text" placeholder="Name" class="s-name">
            <select class="s-pos">${positions.map(p => `<option value="${p}">${p}</option>`).join('')}<option value="Relief">Relief</option></select>
            <input type="time" class="s-start" value="${times[0]}">
            <input type="time" class="s-end" value="${times[times.length-1]}">
            <select class="s-role"><option value="Fixed">Fixed</option><option value="Relief">Relief</option></select>
            <button onclick="this.parentElement.remove()" style="background:none; color:red;">✖</button>
        `;
        container.appendChild(row);
    }

    function renderTable() {
        document.getElementById('table-head').innerHTML = `<th>Time</th>` + positions.map(p => `<th>${p}</th>`).join('');
        document.getElementById('table-body').innerHTML = times.map(t => `
            <tr>
                <td>${t}</td>
                ${positions.map(p => `<td data-time="${t}" data-pos="${p}">UNMANNED</td>`).join('')}
            </tr>`).join('');
    }

    function generateAutoRoster() {
        renderTable(); // Reset first
        const rows = document.querySelectorAll('.staff-row');
        let fixedStaff = [];
        let reliefStaff = [];

        rows.forEach(row => {
            let s = {
                name: row.querySelector('.s-name').value,
                pos: row.querySelector('.s-pos').value,
                start: row.querySelector('.s-start').value,
                end: row.querySelector('.s-end').value,
                role: row.querySelector('.s-role').value
            };
            if (s.name) s.role === 'Fixed' ? fixedStaff.push(s) : reliefStaff.push(s);
        });

        // 1. Fill Fixed Duties
        fixedStaff.forEach(s => {
            let inShift = false;
            times.forEach(t => {
                if (t === s.start) inShift = true;
                if (t === s.end) inShift = false;
                if (inShift) {
                    const cell = document.querySelector(`td[data-time="${t}"][data-pos="${s.pos}"]`);
                    if (cell) { cell.innerText = s.name; cell.className = 'cell-fixed'; }
                }
            });
        });

        // 2. Assign Meals (60 mins) & Simple Relief
        // This is a simplified version of the logic - it swaps fixed staff out mid-shift
        fixedStaff.forEach((s, index) => {
            let relief = reliefStaff[index % reliefStaff.length];
            if (!relief) return;

            let midPoint = Math.floor(times.length / 2) - 2 + index; // Staggered starts
            for (let i = 0; i < 4; i++) { // 4 slots = 60 mins
                let t = times[midPoint + i];
                const cell = document.querySelector(`td[data-time="${t}"][data-pos="${s.pos}"]`);
                if (cell) { cell.innerText = relief.name; cell.className = 'cell-relief'; }
            }
        });

        alert("Auto-Roster Generated! Review the grid below.");
    }

    function backToEdit() {
        document.getElementById('config-zone').classList.remove('hidden');
        document.getElementById('summary-zone').classList.add('hidden');
    }
</script>
</body>
</html>
