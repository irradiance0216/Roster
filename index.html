<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July's Pro Shift Planner</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --text: #333; --unmanned: #eee; --accent: #27ae60; --selected: #ffeb3b; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        #worker-palette { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .worker-chip { display: inline-block; padding: 8px 15px; margin: 5px; background: #e9ecef; border-radius: 20px; cursor: pointer; border: 2px solid transparent; }
        .worker-chip.active { border-color: var(--primary); background: var(--selected); }
        .table-scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; border-radius: 10px; }
        table { border-collapse: collapse; min-width: 1000px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; width: 100px; user-select: none; }
        td:first-child, th:first-child { position: sticky; left: 0; background: #f8f9fa; z-index: 5; font-weight: bold; }
        .cell-assigned { background: #d4edda; font-weight: bold; }
        .hidden { display: none; }
        .summary-card { border-left: 5px solid var(--primary); padding: 15px; margin: 10px 0; background: white; }
        .stats-box { display: flex; gap: 15px; margin-top: 5px; font-size: 0.9em; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<header style="text-align:center;">
    <h1>Shift Planner & Auditor 📑</h1>
    <div class="btn-group">
        <button class="btn-primary" onclick="initShift('07:45', '14:45')">Early</button>
        <button class="btn-primary" onclick="initShift('14:45', '21:45')">Afternoon</button>
        <button class="btn-primary" onclick="initShift('21:45', '07:45')">Night</button>
    </div>
</header>

<main>
    <div id="setup-zone" class="hidden">
        <div id="worker-palette">
            <strong>1. Team:</strong> <input type="text" id="worker-input" placeholder="Name">
            <button onclick="addWorker()">Add</button>
            <div id="worker-list"></div>
        </div>

        <div style="margin-bottom: 15px; text-align: center;">
            <input type="text" id="new-pos" placeholder="Position Name">
            <button class="btn-primary" onclick="addPosition()">+ Add Position</button>
        </div>
        
        <div class="table-scroll-wrapper">
            <table>
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <button class="btn-primary" style="width:100%; margin-top:20px; background:var(--accent);" onclick="showSummary()">Verify & Generate Summary</button>
    </div>

    <div id="summary-zone" class="hidden">
        <div id="summary-content"></div>
        <button class="btn-primary" style="width:100%;" onclick="backToEdit()">Modify Schedule</button>
    </div>
</main>

<script>
    let times = [], positions = [], workers = [], activeWorker = null;

    function initShift(start, end) {
        times = [];
        let curr = new Date(`2026-01-01T${start}:00`), stop = new Date(`2026-01-01T${end}:00`);
        if (stop <= curr) stop.setDate(stop.getDate() + 1);
        while (curr < stop) {
            times.push(curr.toTimeString().substring(0, 5));
            curr.setMinutes(curr.getMinutes() + 15);
        }
        document.getElementById('setup-zone').classList.remove('hidden');
        renderTable();
    }

    function addWorker() {
        const name = document.getElementById('worker-input').value.trim();
        if (name && !workers.includes(name)) { workers.push(name); renderWorkerList(); }
        document.getElementById('worker-input').value = '';
    }

    function renderWorkerList() {
        document.getElementById('worker-list').innerHTML = workers.map(w => 
            `<span class="worker-chip ${activeWorker === w ? 'active' : ''}" onclick="selectWorker('${w}')">${w}</span>`
        ).join('') + `<span class="worker-chip" onclick="selectWorker(null)" style="background:#ffcccc">Eraser</span>`;
    }

    function selectWorker(name) { activeWorker = name; renderWorkerList(); }

    function addPosition() {
        const val = document.getElementById('new-pos').value;
        if (val) { positions.push(val); renderTable(); }
        document.getElementById('new-pos').value = '';
    }

    function renderTable() {
        document.getElementById('table-head').innerHTML = `<th>Time</th>` + positions.map(p => `<th>${p}</th>`).join('');
        document.getElementById('table-body').innerHTML = times.map(t => `
            <tr>
                <td>${t}</td>
                ${positions.map(p => `<td onclick="paintCell(this)" data-time="${t}" data-pos="${p}">UNMANNED</td>`).join('')}
            </tr>`).join('');
    }

    function paintCell(cell) {
        const time = cell.dataset.time;
        if (!activeWorker) {
            cell.innerText = "UNMANNED";
            cell.classList.remove('cell-assigned');
            return;
        }

        // VALIDATION RULE: Check if worker is already in another position at this time
        let conflict = false;
        document.querySelectorAll(`td[data-time="${time}"]`).forEach(td => {
            if (td !== cell && td.innerText === activeWorker) conflict = true;
        });

        if (conflict) {
            alert(`${activeWorker} is already assigned to a position at ${time}!`);
            return;
        }

        cell.innerText = activeWorker;
        cell.classList.add('cell-assigned');
    }

    function showSummary() {
        let workerLogs = {};
        document.querySelectorAll('#table-body td[data-pos]').forEach(cell => {
            const name = cell.innerText;
            if (name !== "UNMANNED") {
                if (!workerLogs[name]) workerLogs[name] = [];
                workerLogs[name].push({ time: cell.dataset.time, pos: cell.dataset.pos });
            }
        });

        let html = '<h2>Audit Summary</h2>';
        for (const [name, tasks] of Object.entries(workerLogs)) {
            let workMinutes = tasks.length * 15;
            let breakMinutes = (times.length * 15) - workMinutes;
            
            html += `<div class="summary-card">
                <strong>${name}</strong>
                <div class="stats-box">
                    <span>Work: ${workMinutes}m</span> | <span>Break: ${breakMinutes}m</span>
                </div><hr>`;
            
            let workerTimeMap = {};
            tasks.forEach(t => workerTimeMap[t.time] = t.pos);
            let currentStart = times[0];

            times.forEach((t, i) => {
                let currentPos = workerTimeMap[t] || "Break";
                if (i === times.length - 1 || (workerTimeMap[times[i+1]] || "Break") !== currentPos) {
                    let style = currentPos === 'Break' ? 'style="color:var(--danger)"' : '';
                    html += `<span ${style}>${currentStart} - ${getNextTime(t)}: ${currentPos}</span><br>`;
                    if (i < times.length - 1) currentStart = times[i+1];
                }
            });
            html += `</div>`;
        }
        document.getElementById('summary-content').innerHTML = html;
        document.getElementById('setup-zone').classList.add('hidden');
        document.getElementById('summary-zone').classList.remove('hidden');
    }

    function getNextTime(t) {
        let d = new Date(`2026-01-01T${t}:00`);
        d.setMinutes(d.getMinutes() + 15);
        return d.toTimeString().substring(0, 5);
    }

    function backToEdit() {
        document.getElementById('setup-zone').classList.remove('hidden');
        document.getElementById('summary-zone').classList.add('hidden');
    }
</script>
</body>
</html>
