<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July's Garden: Manual Scheduler</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --text: #333; --accent: #27ae60; --danger: #e74c3c; --closed: #34495e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        @media print { .no-print { display: none !important; } .card { box-shadow: none; border: 1px solid #ddd; } table { font-size: 10px; } }

        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* Drag-to-Paint Palette */
        #palette { position: sticky; top: 0; z-index: 1000; background: white; padding: 10px; border-bottom: 3px solid var(--primary); display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { padding: 8px 15px; border-radius: 20px; border: 2px solid #ddd; cursor: pointer; background: white; font-size: 14px; user-select: none; }
        .chip.active { border-color: var(--primary); background: var(--primary); color: white; }
        .chip-closed { background: var(--closed); color: white; border-color: var(--closed); }

        /* Responsive Table */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 10px; }
        table { border-collapse: collapse; min-width: 1000px; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; user-select: none; touch-action: none; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        td:first-child { position: sticky; left: 0; background: #f8f9fa; font-weight: bold; z-index: 2; }
        
        .painted { background: #e3f2fd; font-weight: bold; color: var(--primary); }
        .painted-closed { background: var(--closed); color: white; }

        /* Summary View */
        .summary-item { border-left: 5px solid var(--primary); padding: 10px; margin-bottom: 10px; background: white; border-radius: 5px; }
        .pos-tag { display: inline-block; padding: 2px 6px; background: #eee; border-radius: 4px; font-size: 0.8em; margin-right: 4px; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="text-align:center;">Shift Builder 🌸</h2>
    <div class="btn-group">
        <button class="btn-primary" onclick="setupShift('07:45', '14:45')">Early</button>
        <button class="btn-primary" onclick="setupShift('14:45', '21:45')">Afternoon</button>
        <button class="btn-primary" onclick="setupShift('21:45', '07:45')">Night</button>
    </div>

    <div id="setup-area" class="card" style="display:none;">
        <h3>1. Manage Positions</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="new-pos" placeholder="e.g. CFD1" style="flex:1; padding:8px;">
            <button onclick="addPos()" class="btn-primary">Add</button>
        </div>
        <div id="pos-chips" style="display:flex; gap:5px; flex-wrap:wrap;"></div>

        <h3>2. Input Workers</h3>
        <textarea id="worker-names" placeholder="Enter names (one per line)" style="width:100%; height:80px; padding:10px;"></textarea>
        <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="startBuilding()">3. Start Painting ➔</button>
    </div>
</div>

<div id="editor-area" style="display:none;">
    <div id="palette" class="no-print card">
        <div id="worker-palette" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
        <div class="chip chip-closed" onclick="selectBrush('CLOSED')">CLOSED</div>
        <div class="chip" onclick="selectBrush('UNMANNED')">Eraser</div>
        <button onclick="window.print()" style="margin-left:auto; background:var(--accent); color:white;">Print PDF</button>
    </div>

    <div class="table-wrapper card">
        <table>
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="summary-area" class="card">
        <h3>Live Summary</h3>
        <div id="summary-list"></div>
    </div>
</div>

<script>
    let times = [], positions = ["EA", "SA", "WA", "TA", "DA"], workers = [], activeBrush = null, isDragging = false;

    function setupShift(start, end) {
        times = [];
        let curr = new Date(`2026-01-01T${start}:00`), stop = new Date(`2026-01-01T${end}:00`);
        if (stop <= curr) stop.setDate(stop.getDate() + 1);
        while (curr < stop) {
            times.push(curr.toTimeString().substring(0, 5));
            curr.setMinutes(curr.getMinutes() + 15);
        }
        document.getElementById('setup-area').style.display = 'block';
        renderPos();
    }

    function addPos() {
        let val = document.getElementById('new-pos').value.trim();
        if (val) { positions.push(val); renderPos(); document.getElementById('new-pos').value = ''; }
    }

    function renderPos() {
        document.getElementById('pos-chips').innerHTML = positions.map((p, i) => 
            `<span class="pos-tag">${p} <b onclick="positions.splice(${i},1);renderPos()" style="cursor:pointer;color:red">×</b></span>`).join('');
    }

    function startBuilding() {
        workers = document.getElementById('worker-names').value.split('\n').filter(n => n.trim());
        if (workers.length === 0) return alert("Add some workers first!");

        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('editor-area').style.display = 'block';
        
        // Render Palette
        document.getElementById('worker-palette').innerHTML = workers.map(w => 
            `<div class="chip" onclick="selectBrush('${w}')" id="brush-${w}">${w}</div>`).join('');
        
        // Render Table
        document.getElementById('table-head').innerHTML = `<th>Time</th>` + positions.map(p => `<th>${p}</th>`).join('');
        document.getElementById('table-body').innerHTML = times.map(t => `
            <tr>
                <td>${t}</td>
                ${positions.map(p => `<td onpointerdown="startPaint(this)" onpointerenter="continuePaint(this)" data-time="${t}" data-pos="${p}">-</td>`).join('')}
            </tr>`).join('');
        
        window.onpointerup = () => { isDragging = false; updateSummary(); };
    }

    function selectBrush(name) {
        activeBrush = name;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if (name !== 'UNMANNED' && name !== 'CLOSED') document.getElementById(`brush-${name}`).classList.add('active');
    }

    function startPaint(el) { isDragging = true; paint(el); }
    function continuePaint(el) { if (isDragging) paint(el); }

    function paint(el) {
        if (!activeBrush) return;
        el.innerText = activeBrush === 'UNMANNED' ? '-' : activeBrush;
        el.className = activeBrush === 'CLOSED' ? 'painted-closed' : (activeBrush === 'UNMANNED' ? '' : 'painted');
    }

    function updateSummary() {
        let data = {};
        workers.forEach(w => data[w] = { total: 0, intervals: [] });

        document.querySelectorAll('td[data-pos]').forEach(td => {
            let name = td.innerText;
            if (data[name]) {
                data[name].total += 15;
                data[name].intervals.push({t: td.dataset.time, p: td.dataset.pos});
            }
        });

        let html = '';
        for (let name in data) {
            let breakTime = (times.length * 15) - data[name].total;
            html += `<div class="summary-item">
                <strong>${name}</strong> | Total Work: ${data[name].total}m | Break: ${breakTime}m<br>
                <small>${formatIntervals(data[name].intervals)}</small>
            </div>`;
        }
        document.getElementById('summary-list').innerHTML = html;
    }

    function formatIntervals(arr) {
        if (arr.length === 0) return "No assignments";
        return arr.map(i => `<span class="pos-tag">${i.t} [${i.p}]</span>`).join(' ');
    }
</script>
</body>
</html>
