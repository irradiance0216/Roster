<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July's Garden: Shift Master Pro</title>
    <style>
        :root { 
            --primary: #ffb7c5; /* Sakura Pink */
            --bg: #fff5f7; 
            --text: #4a4a4a; 
            --accent: #ff8fa3; 
            --danger: #ff4d6d; 
            --closed: #5c5c5c; 
            --bulk: #f39c12;
            --card-bg: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 10px; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* --- Cherry Blossom Animation --- */
        .cherry-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .petal { position: absolute; background-color: #ffb7c5; border-radius: 150% 0 150% 0; opacity: 0.7; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media print { 
            .no-print, .cherry-container, #palette, button, hr { display: none !important; } 
            .table-wrapper { max-height: none !important; overflow: visible !important; }
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #eee; }
        }

        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(255,183,197,0.3); backdrop-filter: blur(5px); }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.2s; background: var(--primary); color: white; }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }
        
        #palette { position: sticky; top: 0; z-index: 1000; background: white; padding: 10px; border-bottom: 3px solid var(--primary); display: flex; flex-wrap: wrap; gap: 8px; align-items: center;}
        .chip { padding: 8px 15px; border-radius: 20px; border: 2px solid #ffd1dc; cursor: pointer; font-size: 14px; user-select: none; font-weight: bold; background: white; }
        .chip.active { border-color: var(--accent); background: var(--primary); color: white; }

        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 10px; max-height: 60vh; border: 1px solid #ffd1dc; }
        table { border-collapse: collapse; min-width: 1200px; width: 100%; }
        th, td { border: 1px solid #ffd1dc; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #fff0f3; position: sticky; top: 0; z-index: 10; }
        td:first-child { position: sticky; left: 0; background: #fff0f3; font-weight: bold; z-index: 5; width: 120px; }

        .summary-item { flex: 1 1 300px; max-width: 450px; border-left: 8px solid var(--primary); padding: 12px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .pos-label { font-weight: bold; color: var(--accent); }
        .tag { background: #fff0f3; padding: 4px 10px; border-radius: 12px; font-size: 12px; border: 1px solid #ffd1dc; margin-right: 5px; }
    </style>
</head>
<body>

<div class="cherry-container" id="cherry-js"></div>

<div class="no-print">
    <h2 style="text-align:center; color: var(--accent);">Sakura Shift Master 🌸</h2>
    
    <div class="card">
        <h3>1. Registry & Setup</h3>
        <div class="btn-group">
            <button onclick="document.getElementById('csv-file').click()" style="background:#555;">📂 Import Previous CSV</button>
            <input type="file" id="csv-file" style="display:none" accept=".csv" onchange="handleImport(this)">
            <button onclick="clearAllData()" style="background:var(--danger);">🗑️ Reset Garden</button>
        </div>

        <div style="display:flex; gap:15px; flex-wrap:wrap; margin: 15px 0;">
            <div style="flex:1;">
                <label><b>Precision:</b></label>
                <select id="interval-select" onchange="updateIntervalSetting()" style="width:100%; padding:8px; border-radius:10px; border:1px solid #ffd1dc;">
                    <option value="5">5 Minutes</option>
                    <option value="10">10 Minutes</option>
                    <option value="15" selected>15 Minutes</option>
                </select>
            </div>
            <div style="flex:1;">
                <label><b>Add Station:</b></label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="pos-input" placeholder="e.g. CFD1" style="flex:1; padding:8px; border:1px solid #ffd1dc; border-radius:10px;">
                    <button onclick="addPosition()">Add</button>
                </div>
            </div>
        </div>
        <div id="pos-list" style="margin-bottom:15px;"></div>

        <h4>Staff Registry</h4>
        <div id="staff-input-list"></div>
        <button onclick="addNewStaff()" style="width:100%; background:var(--accent);">+ Add Staff Member</button>
    </div>

    <div class="card">
        <h3>2. View Window</h3>
        <div class="btn-group">
            <button onclick="setView('07:45', '15:00')">Early View</button>
            <button onclick="setView('14:30', '22:00')">Afternoon View</button>
            <button onclick="setView('21:45', '08:00')">Night View</button>
        </div>
    </div>
</div>

<div id="editor-area" style="display:none;">
    <div id="palette" class="no-print card">
        <div id="worker-palette" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
        <div class="chip" onclick="selectBrush('CLOSED', this)" style="background:var(--closed);color:white">CLOSED</div>
        <div class="chip" onclick="selectBrush('UNMANNED', this)">Eraser</div>
        <button id="bulk-mode-btn" style="background:var(--bulk);" onclick="toggleBulkMode()">Bulk Fill: OFF</button>
        <div style="margin-left:auto; display:flex; gap:5px;">
            <button onclick="downloadCSV()" style="background:#555;">📥 Export CSV</button>
            <button onclick="window.print()" style="background:var(--accent);">🖨️ Print</button>
        </div>
    </div>

    <div class="table-wrapper card">
        <table>
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="summary-area" class="card"></div>
</div>

<script>
    // --- Initial Config ---
    const shiftPresets = { "E1": ["07:45", "15:00"], "E2": ["07:45", "16:00"], "F1": ["08:45", "17:00"], "G1": ["09:45", "18:00"], "A1": ["14:30", "22:00"], "N1": ["21:45", "08:00"] };
    const workerColors = ["#ffd1dc", "#ffb7c5", "#ffc0cb", "#ffe4e1", "#fff0f5", "#f8bbd0", "#f48fb1", "#ffccbc", "#d1c4e9", "#e1bee7"];
    
    let positions = ["EA", "SA", "WA", "TA", "DA"];
    let staffData = []; 
    let assignments = {}; 
    let currentViewTimes = [];
    let timeInterval = 15;
    let activeBrush = null, isStickyPainting = false, lockedColumn = null, isBulkMode = false, bulkStart = null;

    // --- Core Logic: The Sync Engine ---
    function validateAndRefresh() {
        autoSave(); // Collect current registry inputs
        
        // 1. Scrub assignments: if shift time changed, remove invalid slots
        Object.keys(assignments).forEach(key => {
            let workerName = assignments[key];
            if (workerName === "-" || workerName === "CLOSED") return;
            
            let [time, pos] = key.split('-');
            let worker = staffData.find(s => s.name === workerName);
            
            if (!worker || !isTimeInRange(time, worker.start, worker.end)) {
                delete assignments[key];
            }
        });

        // 2. Immediate UI Refresh
        if(document.getElementById('editor-area').style.display !== 'none') {
            renderEditor();
            updateSummary();
        }
    }

    function autoSave() {
        const rows = Array.from(document.querySelectorAll('#staff-input-list > div'));
        staffData = rows.map(row => ({
            name: row.querySelector('.staff-name').value.trim(),
            start: row.querySelector('.staff-start').value,
            end: row.querySelector('.staff-end').value,
            shiftId: row.querySelector('.staff-shift').value
        })).filter(s => s.name);
        
        localStorage.setItem('julyGarden_Sakura', JSON.stringify({ positions, timeInterval, assignments, staff: staffData }));
    }

    function renameWorkerPrompt(oldName, btn) {
        let input = btn.parentElement.querySelector('.staff-name');
        let newName = prompt(`Rename "${oldName || 'New'}" everywhere?`, oldName || "");
        if(newName && newName !== oldName) {
            if(oldName) {
                Object.keys(assignments).forEach(k => { if(assignments[k] === oldName) assignments[k] = newName; });
            }
            input.value = newName;
            validateAndRefresh(); // This triggers the summary update!
        }
    }

    function applyPreset(sel) {
        if(!sel.value) return;
        const [s, e] = shiftPresets[sel.value];
        const row = sel.parentElement;
        row.querySelector('.staff-start').value = s;
        row.querySelector('.staff-end').value = e;
        validateAndRefresh();
    }

    // --- UI Rendering ---
    function setView(sTime, eTime) {
        validateAndRefresh();
        document.getElementById('editor-area').style.display = 'block';
        currentViewTimes = [];
        let curr = new Date(`2026-01-01T${sTime}:00`), stop = new Date(`2026-01-01T${eTime}:00`);
        if (stop <= curr) stop.setDate(stop.getDate() + 1);
        while (curr < stop) { 
            currentViewTimes.push(curr.toTimeString().substring(0, 5)); 
            curr.setMinutes(curr.getMinutes() + timeInterval); 
        }
        renderEditor(); 
        updateSummary();
    }

    function renderEditor() {
        document.getElementById('worker-palette').innerHTML = staffData.map(s => 
            `<div class="chip" onclick="selectBrush('${s.name}', this)" id="brush-${s.name}" style="background:${getWorkerColor(s.name)}">${s.name}</div>`).join('');
        document.getElementById('table-head').innerHTML = `<th class="no-print">Time Range</th>` + positions.map(p => `<th id="head-${p}">${p}</th>`).join('');
        document.getElementById('table-body').innerHTML = currentViewTimes.map(t => {
            return `<tr><td>${t} - ${getEnd(t)}</td>${positions.map(p => {
                let v = assignments[`${t}-${p}`] || "-";
                let bg = v === "CLOSED" ? "var(--closed)" : (v !== "-" ? getWorkerColor(v) : "");
                return `<td onclick="handleCellClick(this)" onpointerenter="hoverPaint(this)" data-time="${t}" data-pos="${p}" style="background:${bg}; color:${v==='CLOSED'?'white':''}">${v}</td>`;
            }).join('')}</tr>`;
        }).join('');
    }

    function updateSummary() {
        let html = '';
        staffData.forEach(worker => {
            let workMin = 0, timeline = [];
            currentViewTimes.forEach(t => {
                if(!isTimeInRange(t, worker.start, worker.end)) return;
                let hits = positions.filter(p => assignments[`${t}-${p}`] === worker.name);
                let curP = hits.length > 0 ? hits[0] : "Break";
                timeline.push({ time: t, pos: curP });
                if(curP !== "Break") workMin += timeInterval;
            });
            if(!timeline.length) return;
            let merged = []; let s = timeline[0].time; let curP = timeline[0].pos;
            for(let i=1; i<=timeline.length; i++){
                if(i===timeline.length || timeline[i].pos !== curP) {
                    merged.push({s, e: (i===timeline.length ? getEnd(timeline[i-1].time) : timeline[i].time), p: curP});
                    if(i<timeline.length){ s = timeline[i].time; curP = timeline[i].pos; }
                }
            }
            html += `<div class="summary-item">
                <strong>${worker.name}</strong> <span style="font-size:0.8em; color:#888;">(${workMin}m Duty)</span>
                <hr style="border:0; border-top:1px solid #ffd1dc; margin:5px 0;">
                ${merged.map(m => `<div class="timeline-row"><span>${m.s}-${m.e}</span><span class="pos-label">${m.p}</span></div>`).join('')}
            </div>`;
        });
        document.getElementById('summary-area').innerHTML = `<h3 style="color:var(--accent)">Live Summary</h3><div style="display:flex; flex-wrap:wrap; gap:10px;">${html}</div>`;
    }

    // --- Helpers ---
    function handleCellClick(el) {
        if(!activeBrush) return;
        if (isBulkMode) {
            if (!bulkStart) { bulkStart = { time: el.dataset.time, pos: el.dataset.pos }; el.style.outline = "2px dashed var(--bulk)"; }
            else { 
                executeBulkFill(bulkStart.time, el.dataset.time, el.dataset.pos);
                bulkStart = null; renderEditor();
            }
            return;
        }
        if (isStickyPainting) { isStickyPainting = false; lockedColumn = null; document.body.style.cursor = "default"; validateAndRefresh(); }
        else { isStickyPainting = true; lockedColumn = el.dataset.pos; document.body.style.cursor = "crosshair"; paint(el); }
    }

    function executeBulkFill(s, e, pos) {
        let t1 = currentViewTimes.indexOf(s), t2 = currentViewTimes.indexOf(e);
        for (let i = Math.min(t1, t2); i <= Math.max(t1, t2); i++) paint(document.querySelector(`td[data-time="${currentViewTimes[i]}"][data-pos="${pos}"]`));
        validateAndRefresh();
    }

    function hoverPaint(el) { if(isStickyPainting && el.dataset.pos === lockedColumn) paint(el); }

    function paint(el) {
        let t = el.dataset.time, p = el.dataset.pos;
        if (activeBrush === 'UNMANNED') { assignments[`${t}-${p}`] = "-"; }
        else if (activeBrush === 'CLOSED') { assignments[`${t}-${p}`] = "CLOSED"; }
        else {
            let w = staffData.find(s => s.name === activeBrush);
            if(!isTimeInRange(t, w.start, w.end)) return;
            if(positions.find(pos => pos !== p && assignments[`${t}-${pos}`] === activeBrush)) return;
            assignments[`${t}-${p}`] = activeBrush;
        }
        el.innerText = assignments[`${t}-${p}`];
        let v = assignments[`${t}-${p}`];
        el.style.background = v === "CLOSED" ? "var(--closed)" : (v !== "-" ? getWorkerColor(v) : "");
    }

    function isTimeInRange(target, s, e) {
        if (!s || !e) return false;
        return s < e ? (target >= s && target < e) : (target >= s || target < e);
    }

    function getEnd(t) {
        let [h, m] = t.split(':').map(Number);
        m += timeInterval; if(m>=60){ h=(h+Math.floor(m/60))%24; m=m%60; }
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    function getWorkerColor(name) { let idx = staffData.findIndex(s => s.name === name); return idx === -1 ? "#ffffff" : workerColors[idx % workerColors.length]; }
    function selectBrush(name, el) { activeBrush = name; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
    function toggleBulkMode() { isBulkMode = !isBulkMode; isStickyPainting = false; bulkStart = null; document.getElementById('bulk-mode-btn').innerText = isBulkMode ? "Bulk Fill: ON" : "Bulk Fill: OFF"; }
    function updateIntervalSetting() { timeInterval = parseInt(document.getElementById('interval-select').value); validateAndRefresh(); }
    function addPosition() { let val = document.getElementById('pos-input').value.trim().toUpperCase(); if(val && !positions.includes(val)) { positions.push(val); renderPositions(); autoSave(); document.getElementById('pos-input').value = ''; } }
    function renderPositions() { document.getElementById('pos-list').innerHTML = positions.map((p, i) => `<span class="tag">${p} <b onclick="positions.splice(${i},1);renderPositions();validateAndRefresh()" style="color:red;cursor:pointer;">×</b></span>`).join(''); }

    function addNewStaff(saved = null) {
        const div = document.createElement('div');
        div.className = 'btn-group';
        div.innerHTML = `
            <input type="text" placeholder="Name" class="staff-name" value="${saved?.name || ''}" readonly style="flex:1; background:#fefefe; border:1px solid #ffd1dc; border-radius:10px; padding:5px;">
            <button onclick="renameWorkerPrompt('${saved?.name || ''}', this)" style="background:#ddd; color:#4a4a4a;">✏️</button>
            <select class="staff-shift" onchange="applyPreset(this)" style="border-radius:10px; border:1px solid #ffd1dc;">
                <option value="">Shift</option>
                ${Object.keys(shiftPresets).map(k => `<option value="${k}" ${saved?.shiftId === k ? 'selected' : ''}>${k}</option>`).join('')}
            </select>
            <input type="time" class="staff-start" value="${saved?.start || ''}" onchange="validateAndRefresh()" style="border-radius:10px; border:1px solid #ffd1dc;">
            <input type="time" class="staff-end" value="${saved?.end || ''}" onchange="validateAndRefresh()" style="border-radius:10px; border:1px solid #ffd1dc;">
            <button onclick="this.parentElement.remove();validateAndRefresh()" style="background:none; color:red;">×</button>
        `;
        document.getElementById('staff-input-list').appendChild(div);
    }

    function handleImport(input) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let newStaff = [], newPos = [], newAssign = {}, gridHeaders = [];
            lines.forEach(line => {
                const c = line.split(',').map(x => x.trim());
                if (c[0] === "DATA_TYPE") gridHeaders = c.slice(2);
                else if (c[0] === "GRID") gridHeaders.forEach((h, i) => { if(c[i+2] !== "-") newAssign[`${c[1]}-${h}`] = c[i+2]; });
                else if (c[0] === "META_POSITIONS") newPos = c.slice(1).filter(x => x !== "");
                else if (c[0] === "META_STAFF") newStaff.push({name:c[1], start:c[2], end:c[3], shiftId:c[4]});
            });
            if(newPos.length) positions = newPos;
            assignments = newAssign;
            document.getElementById('staff-input-list').innerHTML = '';
            newStaff.forEach(s => addNewStaff(s));
            renderPositions(); validateAndRefresh();
        };
        reader.readAsText(input.files[0]);
    }

    function downloadCSV() {
        let csv = "DATA_TYPE,Time," + positions.join(",") + "\n";
        currentViewTimes.forEach(t => {
            let row = ["GRID", t];
            positions.forEach(p => row.push(assignments[`${t}-${p}`] || "-"));
            csv += row.join(",") + "\n";
        });
        csv += "META_POSITIONS," + positions.join(",") + "\n";
        staffData.forEach(s => csv += `META_STAFF,${s.name},${s.start},${s.end},${s.shiftId || ''}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = 'july_garden_sakura.csv'; a.click();
    }

    // --- Cherry Blossom Logic ---
    function createPetal() {
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.width = Math.random() * 10 + 5 + 'px';
        petal.style.height = petal.style.width;
        petal.style.animationDuration = Math.random() * 3 + 4 + 's';
        document.getElementById('cherry-js').appendChild(petal);
        setTimeout(() => petal.remove(), 7000);
    }
    setInterval(createPetal, 300);

    // Initial Load
    const saved = localStorage.getItem('julyGarden_Sakura');
    if (saved) {
        const d = JSON.parse(saved);
        positions = d.positions; assignments = d.assignments; timeInterval = d.timeInterval;
        d.staff.forEach(s => addNewStaff(s));
        renderPositions();
    } else { addNewStaff(); }
</script>
</body>
</html>
