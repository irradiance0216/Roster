<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July's Garden: Hybrid Scheduler</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --text: #333; --accent: #27ae60; --danger: #e74c3c; --relief: #9b59b6; --break: #f39c12; --closed: #34495e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Painter Palette */
        #palette { position: sticky; top: 0; z-index: 100; background: white; padding: 10px; border-bottom: 2px solid var(--primary); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .chip { padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 2px solid #ddd; font-weight: bold; font-size: 13px; }
        .chip.active { border-color: var(--primary); background: var(--primary); color: white; }
        .chip-closed { background: var(--closed); color: white; }
        .chip-eraser { background: #eee; }

        .table-scroll-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 10px; }
        table { border-collapse: collapse; min-width: 1200px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; width: 110px; cursor: crosshair; user-select: none; }
        
        .cell-fixed { background: #d4edda; font-weight: bold; }
        .cell-relief { background: #e1d5e7; color: #6a1b9a; }
        .cell-closed { background: var(--closed); color: white; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 20px; }
        .stat-card { background: white; padding: 10px; border-radius: 8px; border-left: 5px solid #ccc; font-size: 0.9em; }
        .under-break { border-left-color: var(--danger); }
        .good-break { border-left-color: var(--accent); }
    </style>
</head>
<body>

<header style="text-align:center;">
    <h1>July's Hybrid Shift Master 🌸</h1>
    <div class="btn-group">
        <button onclick="initShift('07:45', '14:45')">Early</button>
        <button onclick="initShift('14:45', '21:45')">Afternoon</button>
        <button onclick="initShift('21:45', '07:45')">Night</button>
    </div>
</header>

<div id="editor-zone" class="hidden">
    <div id="palette" class="card">
        <strong>Active Brush:</strong>
        <div id="worker-chips"></div>
        <div class="chip chip-closed" onclick="setBrush('CLOSED')">CLOSED</div>
        <div class="chip chip-eraser" onclick="setBrush('UNMANNED')">ERASER</div>
    </div>

    <div class="table-scroll-wrapper">
        <table>
            <thead><tr id="table-head"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <h3>Live Fairness Audit</h3>
    <div id="live-summary" class="summary-grid"></div>
</div>

<script>
    let times = [], positions = [], activeBrush = null, workers = [];
    const mandatoryPositions = ["EA", "SA", "WA", "TA", "DA", "CFD1", "CFD2", "CFD3", "BA1", "BA2"];

    function initShift(start, end) {
        times = [];
        positions = [...mandatoryPositions];
        let curr = new Date(`2026-01-01T${start}:00`), stop = new Date(`2026-01-01T${end}:00`);
        if (stop <= curr) stop.setDate(stop.getDate() + 1);
        while (curr < stop) {
            times.push(curr.toTimeString().substring(0, 5));
            curr.setMinutes(curr.getMinutes() + 15);
        }
        
        // Load staff from previous save to populate chips
        workers = JSON.parse(localStorage.getItem('staffData')) || [];
        
        document.getElementById('editor-zone').classList.remove('hidden');
        renderPalette();
        renderTable();
        updateAudit();
    }

    function renderPalette() {
        const container = document.getElementById('worker-chips');
        container.innerHTML = workers.map(w => `
            <div class="chip" id="chip-${w.name}" onclick="setBrush('${w.name}')">${w.name} (${w.role[0]})</div>
        `).join('');
    }

    function setBrush(val) {
        activeBrush = val;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if(val !== 'CLOSED' && val !== 'UNMANNED') document.getElementById(`chip-${val}`).classList.add('active');
    }

    function renderTable() {
        document.getElementById('table-head').innerHTML = `<th>Time</th>` + positions.map(p => `<th>${p}</th>`).join('');
        document.getElementById('table-body').innerHTML = times.map(t => `
            <tr><td>${t}</td>${positions.map(p => `<td data-time="${t}" data-pos="${p}" onclick="paint(this)">UNMANNED</td>`).join('')}</tr>`).join('');
    }

    function paint(cell) {
        if (!activeBrush) return;
        
        if (activeBrush !== 'UNMANNED' && activeBrush !== 'CLOSED') {
            // Conflict check
            let conflict = false;
            document.querySelectorAll(`td[data-time="${cell.dataset.time}"]`).forEach(td => {
                if (td !== cell && td.innerText === activeBrush) conflict = true;
            });
            if (conflict) { alert(`${activeBrush} is already assigned at this time!`); return; }
        }

        cell.innerText = activeBrush;
        cell.className = activeBrush === 'CLOSED' ? 'cell-closed' : 
                         (activeBrush === 'UNMANNED' ? '' : 
                         (workers.find(w => w.name === activeBrush)?.role === 'Fixed' ? 'cell-fixed' : 'cell-relief'));
        updateAudit();
    }

    function updateAudit() {
        const summary = document.getElementById('live-summary');
        let html = '';

        workers.forEach(w => {
            const onDuty = times.filter(t => t >= w.start && t < w.end);
            const workCells = document.querySelectorAll('td[data-pos]');
            let workCount = 0;
            workCells.forEach(c => { if(c.innerText === w.name) workCount++; });

            let workMin = workCount * 15;
            let totalDutyMin = onDuty.length * 15;
            let breakMin = totalDutyMin - workMin;
            
            let statusClass = '';
            let targetMsg = '';
            
            if (w.role === 'Fixed') {
                statusClass = breakMin >= 90 ? 'good-break' : 'under-break';
                targetMsg = ` (Target: 90m | Diff: ${breakMin - 90}m)`;
            } else {
                statusClass = 'good-break';
                targetMsg = ` (Relief Mode)`;
            }

            html += `
                <div class="stat-card ${statusClass}">
                    <strong>${w.name}</strong> [${w.role}]<br>
                    Work: ${workMin}m | Break: <strong>${breakMin}m</strong><br>
                    <small>${targetMsg}</small>
                </div>`;
        });
        summary.innerHTML = html;
    }
</script>
</body>
</html>
