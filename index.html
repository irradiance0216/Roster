<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Shift Scheduler ⏳</h1>
        <p>Select a proforma to begin configuring the shift.</p>
    </header>

    <main>
        <section id="proforma-selection">
            <button onclick="initShift('early')">Early Shift (07:45 - 14:45)</button>
            <button onclick="initShift('afternoon')">Afternoon Shift (14:45 - 21:45)</button>
            <button onclick="initShift('night')">Night Shift (21:45 - 07:45)</button>
        </section>

        <section id="config-section" style="display:none;">
            <div class="controls">
                <input type="text" id="position-name" placeholder="Enter Position Name">
                <button onclick="addPosition()">+ Add Position</button>
            </div>

            <div class="table-container">
                <table id="schedule-table">
                    <thead>
                        <tr id="time-header">
                            </tr>
                    </thead>
                    <tbody id="position-rows">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="summary-section" style="display:none;">
            <h2>Worker Assignment Summary</h2>
            <div id="summary-output">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
